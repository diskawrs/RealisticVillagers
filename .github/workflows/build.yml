name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Trigger JitPack build for packetevents
        run: |
          echo "Triggering JitPack to build packetevents SNAPSHOT..."
          curl -s "https://jitpack.io/com/github/retrooper/packetevents/2.9.5-SNAPSHOT/build.log" > /dev/null || true
          echo "Waiting for JitPack to finish building..."
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://jitpack.io/com/github/retrooper/packetevents/2.9.5-SNAPSHOT/packetevents-2.9.5-SNAPSHOT.pom")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "JitPack artifact is ready!"
              break
            fi
            sleep 15
          done

      - name: Configure Maven settings for JitPack
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>jitpack.io</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Download BuildTools
        run: |
          mkdir -p buildtools
          curl -o buildtools/BuildTools.jar https://hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar

      - name: Run BuildTools for 1.21.11
        run: |
          cd buildtools
          java -jar BuildTools.jar --rev 1.21.11 --remapped

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Check JAR exists
        id: check_jar
        run: |
          JAR=$(find dist/target -name "*.jar" ! -name "*-sources.jar" | head -n 1)
          if [ -z "$JAR" ]; then
            echo "No JAR found, build may have failed silently."
            exit 1
          fi
          echo "jar_path=$JAR" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RealisticVillagers-1.21.11
          path: ${{ steps.check_jar.outputs.jar_path }}
          if-no-files-found: error
